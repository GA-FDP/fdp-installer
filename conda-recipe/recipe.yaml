context:
  version: ${{ env.get("PKG_VERSION") }}

package:
  name: fdp-installer
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  script: python -m pip install . -vv
  noarch: python

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - versioneer
  run:
    - python >=3.11
    - pixi

tests:
  - python:
      imports:
        - fdp_installer
  - script:
      content:
        - fdp-install --help
        - python tests/testit.py
    files:
      source:
        - tests/

about:
  homepage: https://github.com/ga-fdp/fdp-installer
  license: Apache-2.0
  license_file: LICENSE
  summary: Bootstrap installer for Fusion Data Platform
  description: |
    FDP Installer is a bootstrap package that installs the fdp-install script,
    which uses pixi to manage mixed conda and pip package environments for
    the Fusion Data Platform.
  repository: https://github.com/ga-fdp/fdp-installer

extra:
  recipe-maintainers:
    - sammuli
