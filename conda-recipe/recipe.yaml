context:
  version: ${{ env.get("PKG_VERSION") }}

package:
  name: fdp-installer
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  script: python -m pip install . -vv
  noarch: python

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - versioneer
  run:
    - python >=3.11
    - pixi

tests:
  - python:
      imports:
        - fdp_installer
  - script:
      env:
        BEARER_TOKEN: ${{ env.get("BEARER_TOKEN", default="") }}
        # testit.py runs `fdp-install` + `pixi run`, which solve/install the
        # full FDP env. ga-dfl-labeler carries a `__glibc <2.35` constraint
        # from its build host; modern CI runners report glibc 2.39, so the
        # solve fails without this override. The workflow sets it for the
        # build step, but rattler-build's test sandbox doesn't inherit it.
        CONDA_OVERRIDE_GLIBC: "2.28"
      content:
        - fdp-install --help
        - python tests/testit.py
    files:
      source:
        - tests/

about:
  homepage: https://github.com/ga-fdp/fdp-installer
  license: Apache-2.0
  license_file: LICENSE
  summary: Bootstrap installer for Fusion Data Platform
  description: |
    FDP Installer is a bootstrap package that installs the fdp-install script,
    which uses pixi to manage mixed conda and pip package environments for
    the Fusion Data Platform.
  repository: https://github.com/ga-fdp/fdp-installer

extra:
  recipe-maintainers:
    - sammuli
