[workspace]
name = "fdp_dev"
description = "Dev environment for the Fusion Data Platform - Mixed conda and pip package environment"
channels = ["conda-forge", "ga-fdp/label/staging", "ga-fdp"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
# 0.9.7 adds CakeSignal auto-download of the CAKE DB from Pelican (pulls in a
# filelock run-dep transitively).
toksearch_d3d = ">=0.9.7"
# See pixi.toml: fdp isn't a runtime dep of toksearch_d3d, so pin it explicitly
# (>=0.3.0 brings fdp login / SciToken auth plus the index_pattern feature).
fdp = ">=0.3.0"
pip = "*"

# cmflib exact-pins paramiko==3.4.1 and pathspec==0.12.1, which
# conflict with newer versions provided by conda. The pins below
# force conda to provide the versions cmflib expects.
platformdirs = ">=3.1.1,<4"
protobuf = "<5"
attrs = "<24"
paramiko = "==3.4.1"
pathspec = "==0.12.1"
ga-dfl-labeler = "==1.0.0"

[pypi-dependencies]
cmflib = { git = "https://github.com/sammuli/cmf.git", branch = "fdp_installer_rebase" }

[tasks]
# Define custom tasks here

[feature.dev.dependencies]
black = "*"

[environments]
default = ["dev"]
