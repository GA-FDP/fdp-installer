[workspace]
name = "fdp_dev"
description = "Dev environment for the Fusion Data Platform - Mixed conda and pip package environment"
channels = ["conda-forge", "ga-fdp"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
toksearch_d3d = ">=0.9.6"
# fdp is NOT a runtime dependency of toksearch_d3d (it's only in
# toksearch_d3d's test deps), so without an explicit floor the solver pulls an
# old fdp (0.2.0). Pin it: fdp >=0.2.4 is the version that emits
# PTDATA_JSON_INDEX_PATTERN, which the d3d.yaml parent-dir + json_indexes_*
# snapshot resolution (ptdata >=2.0.9 / toksearch_d3d >=0.9.6) relies on.
fdp = ">=0.2.4"
pip = "*"

# cmflib exact-pins paramiko==3.4.1 and pathspec==0.12.1, which
# conflict with newer versions provided by conda. The pins below
# force conda to provide the versions cmflib expects.
platformdirs = ">=3.1.1,<4"
protobuf = "<5"
attrs = "<24"
paramiko = "==3.4.1"
pathspec = "==0.12.1"
ga-dfl-labeler = "==1.0.0"

[pypi-dependencies]
cmflib = { git = "https://github.com/sammuli/cmf.git", branch = "fdp_installer_rebase" }

[tasks]
# Define custom tasks here

[feature.dev.dependencies]
black = "*"

[environments]
default = ["dev"]
