[workspace]
name = "fdp"
version = "0.2.0"
description = "Fusion Data Platform - Mixed conda and pip package environment"
authors = ["FDP Team <fdp@example.com>"]
channels = ["conda-forge", "ga-fdp"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
toksearch_d3d = "0.2.*"
pip = "*"

# cmflib is disabled until ml-metadata supports Python 3.12.
# ml-metadata==1.15.0 (required by cmflib) only has wheels for 3.9-3.11.
# See: https://github.com/google/ml-metadata/issues/191
#
# cmflib also exact-pins paramiko==3.4.1 and pathspec==0.12.1, which
# conflict with newer versions provided by conda. The pins below were
# workarounds for that; they can be removed when cmflib relaxes its pins.
#
# platformdirs = ">=3.1.1,<4"
# protobuf = "<5"
# attrs = "<24"
# paramiko = "3.4.1"
# pathspec = "0.12.1"

# [pypi-dependencies]
# cmflib = { git = "https://github.com/sammuli/cmf.git", branch = "fdp_installer_rebase" }

[tasks]
# Define custom tasks here

[feature.dev.dependencies]
black = "*"

[environments]
default = ["dev"]
