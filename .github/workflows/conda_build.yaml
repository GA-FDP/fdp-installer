name: Conda Package CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'release-*'
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Set staging channel for pre-release builds
        if: startsWith(github.ref, 'refs/tags/release-')
        run: |
          VERSION="${GITHUB_REF#refs/tags/release-}"
          if [[ "$VERSION" =~ (rc|a|b)[0-9] ]]; then
            echo "EXTRA_CHANNEL=ga-fdp/label/staging" >> $GITHUB_ENV
          fi

      - name: Build Conda package
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          # ga-dfl-labeler has __glibc <2.35 constraint from its build env;
          # override so it installs on newer Ubuntu CI runners
          CONDA_OVERRIDE_GLIBC: "2.28"
          EXTRA_CHANNEL: ${{ env.EXTRA_CHANNEL }}
        run: |
          pixi global install rattler-build
          cd conda-recipe && bash run_build.sh ${HOME}/outdir

      - name: Upload to Anaconda
        if: startsWith(github.ref, 'refs/tags/release-')
        run: |
          VERSION="${GITHUB_REF#refs/tags/release-}"
          if [[ "$VERSION" =~ (rc|a|b)[0-9] ]]; then
            LABEL="staging"
          else
            LABEL="main"
          fi
          rattler-build upload anaconda \
            --owner ga-fdp \
            --label "$LABEL" \
            --api-key ${{ secrets.ANACONDA_API_TOKEN }} \
            --force \
            ${HOME}/outdir/noarch/*.conda
